name: 'Dispatch compatibility tests'
description: 'Dispatch compatibility tests workflow to a target repository'

inputs:
  repo:
    description: 'Target repository (e.g., software-mansion/starknet.py)'
    required: true
  ref:
    description: 'Git reference (branch, tag, or commit SHA) to use'
    required: true
  rpc_version:
    description: 'RPC version path segment (e.g., v0_10)'
    required: true
  workflow_file:
    description: 'Workflow file name to dispatch'
    required: false
    default: 'compatibility-tests.yml'
  gh_token:
    description: 'GitHub token for API authentication'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Dispatch workflow
      shell: bash
      env:
        REPO: ${{ inputs.repo }}
        REF: ${{ inputs.ref }}
        RPC_VERSION: ${{ inputs.rpc_version }}
        WORKFLOW_FILE: ${{ inputs.workflow_file }}
        GH_TOKEN: ${{ inputs.gh_token }}
      run: |
        gh workflow run "${WORKFLOW_FILE}" \
            --repo "${REPO}" \
            --ref "${REF}" \
            --json "{ \"rpc_version\": \"${RPC_VERSION}\" }"
        
        echo "Dispatched ${REPO}@${REF} workflow ${WORKFLOW_FILE} with rpc_version=${RPC_VERSION}"

