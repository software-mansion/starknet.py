name: Scheduled tests

on:
  workflow_dispatch:
    inputs:
      rpc_version:
        description: "RPC version path segment, e.g. v0_10"
        required: true
        type: string

jobs:
    setup-tests:
        name: Setup Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: asdf-vm/actions/setup@v3
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: 'pip'

            - name: Install poetry
              run: |
                  python -m pip install --upgrade pip
                  pip install poetry

            - name: Set up Python 3.14
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: 'poetry'

            - name: Install dependencies
              run: |
                  poetry install

            - name: Cache and compile contracts_v2
              uses: ./.github/actions/cache-and-compile-contracts
              with:
                package: contracts_v2

            - name: Cache and compile contracts_v1
              uses: ./.github/actions/cache-and-compile-contracts
              with:
                package: contracts_v1

            - name: Cache and compile contracts_salted
              uses: ./.github/actions/cache-and-compile-contracts
              with:
                package: contracts_salted

            - name: Upload contracts artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: contract-artifacts
                  path: starknet_py/tests/e2e/mock/

    run-network-tests:
        name: Network tests (testnet) with RPC version ${{ inputs.rpc_version }}
        needs: setup-tests
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
        env:
            SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
            SEPOLIA_ACCOUNT_ADDRESS: ${{ secrets.SEPOLIA_ACCOUNT_ADDRESS }}
            SEPOLIA_ACCOUNT_PRIVATE_KEY: ${{ secrets.SEPOLIA_ACCOUNT_PRIVATE_KEY }}
        steps:
            - uses: actions/checkout@v4

            - name: Download contracts
              uses: actions/download-artifact@v4
              with:
                  name: contract-artifacts
                  path: starknet_py/tests/e2e/mock/

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: 'pip'

            - name: Install poetry
              run: |
                  python -m pip install --upgrade pip
                  pip install poetry

            - name: Set up Python 3.14
              uses: actions/setup-python@v5
              with:
                  python-version: "3.14"
                  cache: 'poetry'

            - uses: asdf-vm/actions/setup@v3

            - name: Update RPC url with version from inputs
              run: |
                URL="${SEPOLIA_RPC_URL}"
                RPC_VERION="${{ inputs.rpc_version }}"
                URL="${URL%/}" # Remove trailing slash if any
                URL="${URL%/*}" # Get base URL without version
                RPC_URL="${URL}/${RPC_VERION}"
                echo "SEPOLIA_RPC_URL=${RPC_URL}" >> "$GITHUB_ENV"

            - name: Run tests
              run: poetry run poe test_ci_on_networks

            - name: Generate coverage in XML
              run: |
                  poetry run coverage xml

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
